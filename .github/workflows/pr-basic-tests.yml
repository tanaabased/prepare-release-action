name: Basic Tests

on:
  pull_request:

jobs:
  basic-tests:
    runs-on: ${{ matrix.os }}
    env:
      term: xterm
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
        version:
          - v0.0.1-riker.1
          - 1.0.0-beta.1
          - dev
        bundle-dependencies:
          - true
          - false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - name: Install deps and prep
        run: |
          bun install --frozen-lockfile --ignore-scripts
          bun run build
      - name: Export formatted release date
        run: echo "RELEASE_DATE=$(date "+%B %e, %Y" | tr -s ' ')" >> $GITHUB_ENV
      - name: Prepare release
        uses: ./
        with:
          version: ${{ matrix.version }}
          bundle-dependencies: ${{ matrix.bundle-dependencies }}
          commands: bun run build
          sync-tags: |
            v2
            kirk-epsilon
          sync: false
          update-files: CHANGELOG.md
          update-files-header: |
            ## {{ UNRELEASED_VERSION }} - [{{ UNRELEASED_DATE }}]({{ UNRELEASED_LINK }})

          update-files-meta: |
            UNRELEASED_DATE=${{ env.RELEASE_DATE }}
            UNRELEASED_LINK=${{ github.repositoryUrl }}
            UNRELEASED_VERSION=v${{ github.run_id }}.${{ github.run_number }}.${{ github.run_attempt}}-build.${{ github.sha }}
      - name: 'TEST: should prepend the requested changelog header'
        if: always()
        run: |
          expected="## v${{ github.run_id }}.${{ github.run_number }}.${{ github.run_attempt}}-build.${{ github.sha }} - [${{ env.RELEASE_DATE }}](${{ github.repositoryUrl }})"
          actual="$(head -n 1 CHANGELOG.md)"
          if [ "${actual}" = "${expected}" ]; then
            echo "::notice title=TEST PASSED::CHANGELOG header updated correctly"
          else
            echo "::error title=TEST FAILED!::CHANGELOG header was not updated correctly"
            echo "expected=${expected}"
            echo "actual=${actual}"
            exit 1
          fi
      - name: 'TEST: should create the requested sync tags locally'
        if: always()
        run: |
          if git --no-pager tag --points-at HEAD | grep -Fx 'v2' && git --no-pager tag --points-at HEAD | grep -Fx 'kirk-epsilon'; then
            echo "::notice title=TEST PASSED::Requested sync tags point at HEAD"
          else
            echo "::error title=TEST FAILED!::Requested sync tags were not created on HEAD"
            exit 1
          fi
