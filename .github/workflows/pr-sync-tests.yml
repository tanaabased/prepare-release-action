name: Sync Tests

on:
  pull_request:

jobs:
  sync-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-24.04
        signed:
          - true
          - false

    steps:
      # Install deps and cache
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - name: Install deps and prep
        run: |
          bun install --frozen-lockfile --ignore-scripts
          bun run build
      - name: Export formatted release date
        run: echo "RELEASE_DATE=$(date "+%B %e, %Y" | tr -s ' ')" >> $GITHUB_ENV
      - name: Checkout fresh repo for testing
        uses: actions/checkout@v6
        with:
          path: test
      - name: Prepare release
        uses: ./
        with:
          version: dev
          commands: |
            touch riker
            touch picard
          meta: |
            jazzman=William T. Riker
            bosmang=Picard
          root: ${{ github.workspace }}/test
          sync: true
          sync-branch: ${{ matrix.signed && 'sync-test-verified' || 'sync-test' }}
          sync-email: william.t.riker@starfleet.mil
          sync-message: riker
          sync-tags: |
            number1-${{ matrix.signed }}
            v99-${{ matrix.signed }}
          sync-token: ${{ secrets.TANAAB_COAXIUM_INJECTOR }}
          sync-username: William T. Riker
          sync-verified: ${{ matrix.signed }}
          update-files: CHANGELOG.md
          update-files-header: |
            ## {{ UNRELEASED_VERSION }} - [{{ UNRELEASED_DATE }}]({{ UNRELEASED_LINK }})
          update-files-meta: |
            UNRELEASED_DATE=${{ env.RELEASE_DATE }}
            UNRELEASED_LINK=${{ github.repositoryUrl }}
            UNRELEASED_VERSION=v${{ github.run_id }}.${{ github.run_number }}.${{ github.run_attempt}}-build.${{ github.sha }}
      - name: Verify sync commit signature state
        env:
          EXPECT_VERIFIED: ${{ matrix.signed }}
          GH_TOKEN: ${{ secrets.TANAAB_COAXIUM_INJECTOR }}
          SYNC_BRANCH: ${{ matrix.signed && 'sync-test-verified' || 'sync-test' }}
        run: |
          actual="$(gh api "repos/${{ github.repository }}/commits/${SYNC_BRANCH}" --jq '.commit.verification.verified')"
          echo "expected=${EXPECT_VERIFIED} actual=${actual}"
          if [ "${actual}" != "${EXPECT_VERIFIED}" ]; then
            gh api "repos/${{ github.repository }}/commits/${SYNC_BRANCH}" --jq '.commit.verification'
            exit 1
          fi
      - name: Checkout again to validate credential restoration
        uses: actions/checkout@v6
        with:
          path: cred-me
