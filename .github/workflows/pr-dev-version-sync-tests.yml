name: Dev Version Tests

on:
  pull_request:

jobs:
  dev-version-tests:
    runs-on: ${{ matrix.os }}
    env:
      term: xterm
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - name: Install deps and prep
        run: |
          bun install --frozen-lockfile --ignore-scripts
          bun run build
      - name: Export pkg.json version
        run: echo "VERSION=$(bun -e 'console.log(require("./package.json").version)')" >> $GITHUB_ENV
      - name: Prepare release
        uses: ./
        with:
          version: v${{ env.VERSION }}
          sync: false
