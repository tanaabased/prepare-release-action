name: Dev Version Tests

on:
  pull_request:

jobs:
  dev-version-tests:
    runs-on: ${{ matrix.os }}
    env:
      term: xterm
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - name: Install deps and prep
        run: |
          bun install --frozen-lockfile --ignore-scripts
          bun run build
      - name: Normalize git history for dev version
        run: |
          if [ "$(git rev-parse --is-shallow-repository)" = 'true' ]; then
            git fetch --unshallow
            git fetch --all
          fi
      - name: Export expected dev version
        run: echo "VERSION=$(git describe --tags --always --abbrev=1 --match='v[0-9].*')" >> $GITHUB_ENV
      - name: Prepare release
        uses: ./
        with:
          version: dev
          sync: false
      - name: 'TEST: should resolve dev to the latest matching version'
        if: always()
        run: |
          expected="${VERSION#v}"
          actual="$(bun -e 'const pkg = await Bun.file("package.json").json(); console.log(pkg.version)')"
          if [ "${actual}" = "${expected}" ]; then
            echo "::notice title=TEST PASSED::dev resolved to the latest matching version"
          else
            echo "::error title=TEST FAILED!::dev did not resolve to the latest matching version"
            echo "expected=${expected}"
            echo "actual=${actual}"
            exit 1
          fi
